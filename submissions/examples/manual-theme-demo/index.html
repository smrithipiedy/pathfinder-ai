<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manual Theme Utility Demo - EaseMotion CSS</title>
    <style>
      /* Base CSS Variables for Light Theme */
      :root {
        --bg-color: #ffffff;
        --text-color: #222222;
        --primary-color: #3b82f6;
        --body-bg: #f3f4f6;
      }

      /* Dark Theme Variables */
      .dark-theme {
        --bg-color: #111827;
        --text-color: #f9fafb;
        --primary-color: #60a5fa;
        --body-bg: #030712;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background-color: var(--body-bg);
        transition: background-color 0.3s ease;
      }

      .theme-demo {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
        width: 100%;
        max-width: 400px;
        padding: 1rem;
      }

      /* Component styling adapting to CSS variables */
      .theme-card {
        background: var(--bg-color);
        color: var(--text-color);
        padding: 2rem;
        border-radius: 12px;
        transition: all 0.3s ease;
        width: 100%;
        box-sizing: border-box;
        box-shadow:
          0 10px 15px -3px rgba(0, 0, 0, 0.1),
          0 4px 6px -2px rgba(0, 0, 0, 0.05);
      }

      .theme-card h2 {
        margin-top: 0;
        margin-bottom: 1rem;
      }

      .theme-card p {
        margin-bottom: 1.5rem;
        line-height: 1.5;
        opacity: 0.9;
      }

      .theme-card button {
        background: var(--primary-color);
        color: white;
        border: none;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        font-size: 1rem;
        width: 100%;
        transition:
          background-color 0.3s ease,
          transform 0.1s ease;
      }

      .theme-card button:hover {
        filter: brightness(1.1);
      }

      .theme-card button:active {
        transform: scale(0.98);
      }

      /* Toggle button for demo purposes */
      .demo-controls {
        display: flex;
        gap: 1rem;
      }

      .toggle-theme-btn {
        padding: 0.5rem 1rem;
        border-radius: 8px;
        border: 1px solid #cbd5e1;
        background: #ffffff;
        color: #334155;
        cursor: pointer;
        font-weight: 500;
        transition: all 0.2s ease;
      }

      .toggle-theme-btn:hover {
        background: #f8fafc;
        border-color: #94a3b8;
      }

      .dark-theme .toggle-theme-btn {
        background: #1e293b;
        border-color: #334155;
        color: #f8fafc;
      }

      .dark-theme .toggle-theme-btn:hover {
        background: #334155;
      }
    </style>
  </head>
  <body>
    <div class="theme-demo">
      <!-- Interactive control to switch themes -->
      <div class="demo-controls">
        <button
          class="toggle-theme-btn"
          aria-pressed="false"
          onclick="const isDark = document.body.classList.toggle('dark-theme'); this.setAttribute('aria-pressed', isDark);"
        >
          Toggle Dark/Light Theme
        </button>
      </div>

      <!-- The actual component demonstrating CSS variables -->
      <div class="theme-card">
        <h2>Theme Demo</h2>
        <p>
          This card automatically adapts to CSS variable changes. EaseMotion CSS
          utilities can seamlessly adapt to different color schemes without
          modifying component markup.
        </p>
        <button>Get Started</button>
      </div>
    </div>
  </body>
</html>
